<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Error — Sagar Game Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
    <style>
        body { background:#0a0a1e; color:#fff; font-family:'Press Start 2P',monospace;
               display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center; }
        .err-box { padding:2rem; }
        .err-code { font-size:4rem; color:#ff4466; margin-bottom:1rem; }
        .err-msg  { font-size:0.8rem; color:#8888bb; margin-bottom:2rem; }
        a { color:#00e5ff; text-decoration:none; font-size:0.6rem; }
        a:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="err-box">
    <div class="err-code">💀 GAME OVER</div>
    <div class="err-msg">Oops! Something crashed in the game world.</div>
    <a href="/">← RESPAWN (Return Home)</a>
</div>
</body>
</html>
